services:
  db:
    image: postgres:15
    container_name: renter_db
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: 12345678
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: renter_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: jushengtin2@gmail.com
      PGADMIN_DEFAULT_PASSWORD: 12345678
    ports:
      - "5051:80"
    depends_on:
      - db
    volumes:
      - ./pgadmin_data:/var/lib/pgadmin

  redis:
    image: redis:latest
    container_name: renter_redis
    ports:
      - "8787:6379"
    volumes:
      - ./redis_data:/data

  redis-gui:
    image: redislabs/redisinsight:latest
    container_name: renter_redis_gui
    environment:
      - REDIS_HOSTS=local:redis:8788
    ports:
      - "8788:5540"
    depends_on:
      - redis
